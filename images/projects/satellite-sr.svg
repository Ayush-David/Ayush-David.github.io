<svg xmlns="http://www.w3.org/2000/svg" width="180" height="120" viewBox="0 0 180 120" role="img" aria-labelledby="title desc">
  <title id="title">Satellite super-resolution thumbnail</title>
  <desc id="desc">Blurred low-resolution tile on the left and crisp high-resolution tile on the right with an arrow between them.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6c177"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="1.8"/></filter>
  </defs>
  <rect width="180" height="120" rx="14" fill="#1c2128"/>
  <rect x="10" y="10" width="160" height="100" rx="12" fill="url(#sky)" stroke="#30363d"/>
  <rect x="18" y="28" width="58" height="58" rx="8" fill="#2d1e10" stroke="#f6c177" filter="url(#blur)"/>
  <rect x="104" y="28" width="58" height="58" rx="8" fill="#39250f" stroke="#f6c177"/>
  <path d="M83 57h13" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <path d="M90 49l8 8-8 8" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="47" y="58" fill="#ffd7a1" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">LR</text>
  <text x="47" y="71" fill="#ffd7a1" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">256px</text>
  <text x="133" y="58" fill="#fff3dc" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">HR</text>
  <text x="133" y="71" fill="#fff3dc" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">512px</text>
  <rect x="26" y="36" width="10" height="10" fill="#8b5e34" opacity="0.8"/>
  <rect x="40" y="40" width="10" height="10" fill="#b45309" opacity="0.8"/>
  <rect x="52" y="34" width="8" height="8" fill="#f59e0b" opacity="0.8"/>
  <rect x="112" y="36" width="8" height="8" fill="#fbbf24"/>
  <rect x="124" y="40" width="8" height="8" fill="#fb923c"/>
  <rect x="136" y="34" width="8" height="8" fill="#f59e0b"/>
  <rect x="112" y="50" width="32" height="4" fill="#93c5fd" opacity="0.7"/>
  <rect x="112" y="58" width="18" height="4" fill="#bfdbfe" opacity="0.7"/>
</svg>