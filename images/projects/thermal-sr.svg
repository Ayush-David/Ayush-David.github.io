<svg xmlns="http://www.w3.org/2000/svg" width="180" height="120" viewBox="0 0 180 120" role="img" aria-labelledby="title desc">
  <title id="title">Thermal super-resolution thumbnail</title>
  <desc id="desc">False-color thermal gradient with blurred input row and sharp output row, plus a Planck notation mark.</desc>
  <defs>
    <linearGradient id="thermal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b2a6f"/>
      <stop offset="35%" stop-color="#22d3ee"/>
      <stop offset="65%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="1.8"/></filter>
  </defs>
  <rect width="180" height="120" rx="14" fill="#1c2128"/>
  <rect x="10" y="10" width="160" height="100" rx="12" fill="#111827" stroke="#30363d"/>
  <text x="16" y="25" fill="#8b949e" font-family="Inter, sans-serif" font-size="9">Input (Blurred Thermal)</text>
  <rect x="16" y="30" width="122" height="24" rx="6" fill="url(#thermal)" filter="url(#soft)"/>
  <text x="16" y="65" fill="#8b949e" font-family="Inter, sans-serif" font-size="9">Output (SR Thermal)</text>
  <rect x="16" y="70" width="122" height="24" rx="6" fill="url(#thermal)"/>
  <text x="155" y="100" fill="#cbd5e1" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="end">B(λ,T)</text>
  <path d="M143 18c8 5 12 12 12 21s-4 16-12 21" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <circle cx="156" cy="30" r="2.3" fill="#58a6ff"/>
  <circle cx="156" cy="52" r="2.3" fill="#f59e0b"/>
</svg>